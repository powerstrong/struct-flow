name = "structflow"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "apps/web/dist"

# Single Pages project hosting SPA + API Functions.
# /api/* is handled by functions/api/[[path]].ts -> apps/api/src/index.ts router.
# Static SPA lives in apps/web/dist; SPA fallback comes from apps/web/public/_redirects.

[env.preview]
vars = { APP_ENV = "dev", COOKIE_SECURE = "true" }
[[env.preview.d1_databases]]
binding = "DB"
database_name = "structflow-dev-db"
database_id = "f7be593c-b91c-4243-9a2a-24667d98d01f"
migrations_dir = "apps/api/migrations"

[env.production]
vars = { APP_ENV = "prod", COOKIE_SECURE = "true" }
[[env.production.d1_databases]]
binding = "DB"
database_name = "structflow-prod-db"
database_id = "7381947e-2c66-4cb4-9561-db39fc08ee4e"
migrations_dir = "apps/api/migrations"
