name = "struct-flow-api"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./public"

# dev / prod 분리: dev는 default env, prod는 [env.production]
[[d1_databases]]
binding = "DB"
database_name = "structmate-dev-db"
database_id = "REPLACE_WITH_DEV_DB_ID"
migrations_dir = "./migrations"

[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "structmate-prod-db"
database_id = "REPLACE_WITH_PROD_DB_ID"
migrations_dir = "./migrations"

[vars]
APP_ENV = "dev"
COOKIE_SECURE = "true"

[env.production.vars]
APP_ENV = "prod"
COOKIE_SECURE = "true"
